name: Dispatch board bot

# Fills Supabase `dispatch_boards` from the ilwu13.com sheets, so the app's board
# updates itself. Runs on a schedule and can also be run by hand (the "Run
# workflow" button in the Actions tab) — optionally with a date + letter to
# backfill one specific sheet.
#
# THIS FILE MUST LIVE AT:  .github/workflows/dispatchbot.yml
# and the bot code at:     bot/dispatch_bot.py + bot/parse_forecast.py
# Secret required:         SUPABASE_SERVICE_KEY  (Settings → Secrets and variables → Actions)

on:
  schedule:
    # every 15 min across the dispatch window (~8 AM – 2 AM Pacific, written in UTC).
    # The bot skips sheets already ingested and sheets not posted yet, so extra
    # runs cost almost nothing.
    - cron: "*/15 15-23,0-8 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Backfill one sheet — date YYYY-MM-DD (leave empty for a normal run)"
        required: false
        default: ""
      kind:
        description: "Backfill one sheet — letter E, N or D (used with date)"
        required: false
        default: ""
      force:
        description: "Re-ingest even if the sheet is already in dispatch_boards"
        type: boolean
        default: false

concurrency:
  group: dispatch-bot
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    env:
      TZ: America/Los_Angeles
      SUPABASE_URL: https://ehykqebzkbelwtkgjbml.supabase.co
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Install OCR + PDF tools
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends tesseract-ocr poppler-utils

      - name: Fetch & parse dispatch sheets
        working-directory: bot
        run: |
          ARGS=""
          if [ -n "${{ inputs.date }}" ] && [ -n "${{ inputs.kind }}" ]; then
            ARGS="--date ${{ inputs.date }} --kind ${{ inputs.kind }}"
          fi
          if [ "${{ inputs.force }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          python3 dispatch_bot.py $ARGS
