# .github/workflows/hall-line.yml
# Calls the hall's recorded dispatch line after each board ends, transcribes it,
# and posts "left off at ___" to the Order's board wire.
#
# GitHub cron is UTC and ignores daylight saving, so each run is scheduled at
# both the PDT and PST offsets — the worker's own Long Beach time gate makes
# the wrong-offset firing exit in under a second.
name: hall-line-leftoff

on:
  schedule:
    - cron: '40 16 * * *'   # 09:40 PDT — day board recording (~after 9:30 end)
    - cron: '40 17 * * *'   # 09:40 PST
    - cron: '40 2 * * *'    # 19:40 PDT — night board recording (~after 19:30 end)
    - cron: '40 3 * * *'    # 19:40 PST
  workflow_dispatch:
    inputs:
      force:
        description: 'Run even outside the fresh-recording window'
        type: boolean
        default: false
      dry_run:
        description: 'Do everything except write to Supabase'
        type: boolean
        default: false
      transcript:
        description: 'Skip the call — parse this text instead (testing)'
        required: false

concurrency:
  group: hall-line
  cancel-in-progress: false

jobs:
  leftoff:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Call the hall line and post where it left off
        env:
          TWILIO_SID:           ${{ secrets.TWILIO_SID }}
          TWILIO_TOKEN:         ${{ secrets.TWILIO_TOKEN }}
          TWILIO_FROM:          ${{ secrets.TWILIO_FROM }}
          DISPATCH_NUMBER:      ${{ secrets.DISPATCH_NUMBER }}
          DISPATCH_DTMF:        ${{ secrets.DISPATCH_DTMF }}
          CALL_SECONDS:         ${{ vars.CALL_SECONDS || '120' }}
          OPENAI_API_KEY:       ${{ secrets.OPENAI_API_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SLOT_KEYWORDS:        ${{ vars.SLOT_KEYWORDS }}
          MIN_CONF:             ${{ vars.MIN_CONF || '0.75' }}
        run: |
          ARGS=""
          [ "${{ inputs.force }}" = "true" ] && ARGS="$ARGS --force"
          [ "${{ inputs.dry_run }}" = "true" ] && ARGS="$ARGS --dry-run"
          if [ -n "${{ inputs.transcript }}" ]; then
            node hall-line-worker/leftoff.js $ARGS --transcript "${{ inputs.transcript }}"
          else
            node hall-line-worker/leftoff.js $ARGS
          fi
