# Cloudflare Workers config for The Shadow Hook.
# This lets Cloudflare auto-deploy the site straight from the GitHub repo:
# every time you upload/commit a file to GitHub, Cloudflare rebuilds and
# redeploys theshadowhook.com on its own — no more manual dashboard upload.
#
# "name" MUST match your Worker's name in the Cloudflare dashboard (shadowhook).
# It's a static site (index.html, sw.js, icons, manifest), so there's no build
# step and no server-side code — Cloudflare just serves the files in this repo.

name = "shadowhook"
compatibility_date = "2026-07-01"

[assets]
directory = "./"
